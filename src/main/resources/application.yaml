spring:
  application:
    name: Software

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/market}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  thymeleaf:
    cache: false
    encoding: UTF-8

server:
  port: ${PORT:8080}
