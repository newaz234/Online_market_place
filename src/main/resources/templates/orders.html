<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MarketHub — My Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--gold:#c9a84c;--gold2:#e8c96d;
  --text:#f0ede8;--muted:#7a7a8a;--border:#2a2a3a;--border2:#1e1e2c;
  --success:#4caf82;--danger:#e05c5c;--info:#5c8ee0;--warn:#e0a84c;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:12px;}
.nav-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:#0a0a0f;}
.nav-brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-link{padding:7px 14px;color:var(--muted);text-decoration:none;font-size:13px;border:1px solid var(--border);border-radius:8px;transition:all .2s;}
.nav-link:hover,.nav-link.active{color:var(--gold);border-color:var(--gold);}
.btn-logout{padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
.container{max-width:960px;margin:40px auto;padding:0 28px;}
.page-header{margin-bottom:24px;}
.page-header h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;margin-bottom:4px;}
.page-header h1 em{font-style:italic;color:var(--gold);}
.page-header p{font-size:14px;color:var(--muted);}
.alert{border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;display:flex;align-items:center;gap:8px;}
.alert-success{background:rgba(76,175,130,0.1);border:1px solid rgba(76,175,130,0.3);color:var(--success);}
.alert-error{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);color:var(--danger);}
.order-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:20px 24px;margin-bottom:14px;animation:cardIn .3s ease both;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.order-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.order-meta h3{font-size:16px;font-weight:600;margin-bottom:3px;}
.order-meta p{font-size:12px;color:var(--muted);}
.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.status-PENDING{background:rgba(224,168,76,0.12);color:var(--warn);}
.status-PROCESSING{background:rgba(92,142,224,0.12);color:var(--info);}
.status-SHIPPED{background:rgba(156,124,239,0.12);color:#9c7cef;}
.status-DELIVERED{background:rgba(76,175,130,0.12);color:var(--success);}
.status-CANCELLED{background:rgba(224,92,92,0.12);color:var(--danger);}
.order-details{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px;
  background:var(--surface2);border-radius:10px;margin-bottom:14px;font-size:13px;}
.detail-label{font-size:11px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
.detail-value{font-weight:500;}
.order-footer{display:flex;align-items:center;justify-content:space-between;}
.order-total{font-size:18px;font-weight:700;color:var(--gold);}
.cancel-info{font-size:12px;color:var(--muted);font-style:italic;}
.btn-cancel{padding:7px 16px;background:transparent;border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-cancel:hover{border-color:var(--danger);color:var(--danger);}
.empty{text-align:center;padding:60px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.shop-link{display:inline-block;margin-top:14px;padding:10px 24px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><div class="nav-logo-mark">M</div><span class="nav-brand">MarketHub</span></div>
  <div class="nav-right">
    <a href="/products" class="nav-link">Products</a>
    <a href="/cart" class="nav-link">🛒 Cart</a>
    <a href="/orders" class="nav-link active">My Orders</a>
    <a href="/seller/my-products" class="nav-link" sec:authorize="hasAnyRole('SELLER','ADMIN')">My Products</a>
    <a href="/seller/orders" class="nav-link" sec:authorize="hasAnyRole('SELLER','ADMIN')">Orders Received</a>
    <form method="post" th:action="@{/logout}" style="margin:0;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn-logout" type="submit">Sign Out</button>
    </form>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>My <em>Orders</em></h1>
    <p>Track and manage your placed orders</p>
  </div>

  <div th:if="${orderSuccess}" class="alert alert-success">✓ <span th:text="${orderSuccess}"></span></div>
  <div th:if="${cancelSuccess}" class="alert alert-success">✓ <span th:text="${cancelSuccess}"></span></div>
  <div th:if="${cancelError}"   class="alert alert-error">⚠ <span th:text="${cancelError}"></span></div>

  <div th:if="${orders.empty}" class="empty">
    <div class="empty-icon">📦</div>
    <p>You haven't placed any orders yet.</p>
    <a href="/products" class="shop-link">Browse Products</a>
  </div>

  <div th:each="o,iter : ${orders}" class="order-card"
       th:style="'animation-delay:' + ${iter.index * 50} + 'ms'">
    <div class="order-header">
      <div class="order-meta">
        <h3 th:text="${o.product.name}"></h3>
        <p>Order #<span th:text="${o.id}"></span>
          · <span th:text="${#temporals.format(o.createdAt, 'dd MMM yyyy, HH:mm')}"></span></p>
      </div>
      <span class="status-badge"
            th:classappend="'status-' + ${o.status.name()}"
            th:text="${o.status.name()}"></span>
    </div>

    <!-- Shipping details -->
    <div class="order-details" th:if="${o.fullName != null}">
      <div>
        <div class="detail-label">Full Name</div>
        <div class="detail-value" th:text="${o.fullName}"></div>
      </div>
      <div>
        <div class="detail-label">Phone</div>
        <div class="detail-value" th:text="${o.phone}"></div>
      </div>
      <div>
        <div class="detail-label">Email</div>
        <div class="detail-value" th:text="${o.email}"></div>
      </div>
      <div>
        <div class="detail-label">Address</div>
        <div class="detail-value"
             th:text="${o.address + ', ' + o.city + (o.postalCode != null ? ' - ' + o.postalCode : '')}"></div>
      </div>
    </div>

    <div class="order-footer">
      <div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px;">
          <span th:text="${o.quantity}"></span> × $<span th:text="${#numbers.formatDecimal(o.product.price,1,2)}"></span>
        </div>
        <div class="order-total" th:text="'$' + ${#numbers.formatDecimal(o.product.price * o.quantity,1,2)}"></div>
      </div>
      <div style="text-align:right;">
        <!-- SHIPPED, DELIVERED, CANCELLED হলে cancel করা যাবে না -->
        <span class="cancel-info"
              th:if="${o.status.name() == 'SHIPPED' or o.status.name() == 'DELIVERED' or o.status.name() == 'CANCELLED'}"
              th:text="${o.status.name() == 'SHIPPED' ? 'Already shipped — cannot cancel' :
                         o.status.name() == 'DELIVERED' ? 'Delivered' : 'Cancelled'}"></span>
        <form th:action="@{/orders/cancel/{id}(id=${o.id})}" method="post"
              th:unless="${o.status.name() == 'SHIPPED' or o.status.name() == 'DELIVERED' or o.status.name() == 'CANCELLED'}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button class="btn-cancel" type="submit" onclick="return confirm('Cancel this order?')">Cancel Order</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
