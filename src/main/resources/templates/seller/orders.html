<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MarketHub — Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--gold:#c9a84c;--gold2:#e8c96d;
  --text:#f0ede8;--muted:#7a7a8a;--border:#2a2a3a;--border2:#1e1e2c;
  --success:#4caf82;--danger:#e05c5c;--info:#5c8ee0;--warn:#e0a84c;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:12px;}
.nav-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:#0a0a0f;}
.nav-brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-link{padding:7px 14px;color:var(--muted);text-decoration:none;font-size:13px;border:1px solid var(--border);border-radius:8px;transition:all .2s;}
.nav-link:hover,.nav-link.active{color:var(--gold);border-color:var(--gold);}
.btn-logout{padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
.container{max-width:1100px;margin:40px auto;padding:0 28px;}
.page-header{margin-bottom:28px;}
.page-header h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;margin-bottom:4px;}
.page-header h1 em{font-style:italic;color:var(--gold);}
.page-header p{font-size:14px;color:var(--muted);}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:center;}
.stat-num{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.num-pending{color:var(--warn);}
.num-processing{color:var(--info);}
.num-shipped{color:#9c7cef;}
.num-delivered{color:var(--success);}
.num-cancelled{color:var(--danger);}
.num-revenue{color:var(--gold);}
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:12px;color:var(--muted);letter-spacing:.5px;}
.filter-btn{padding:7px 14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-size:13px;text-decoration:none;transition:all .2s;}
.filter-btn:hover{border-color:var(--gold);color:var(--gold);}
.filter-btn.active{background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--border);}
th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:14px 18px;font-weight:500;}
td{padding:13px 18px;font-size:13px;border-bottom:1px solid var(--border2);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}
.status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.status-PENDING{background:rgba(224,168,76,0.12);color:var(--warn);}
.status-PROCESSING{background:rgba(92,142,224,0.12);color:var(--info);}
.status-SHIPPED{background:rgba(156,124,239,0.12);color:#9c7cef;}
.status-DELIVERED{background:rgba(76,175,130,0.12);color:var(--success);}
.status-CANCELLED{background:rgba(224,92,92,0.12);color:var(--danger);}
.status-form{display:flex;gap:6px;align-items:center;}
.status-select{padding:5px 8px;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:12px;outline:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.status-select:focus{border-color:var(--gold);}
.btn-update{padding:5px 12px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:6px;color:#0a0a0f;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.total-cell{font-weight:600;color:var(--success);}
.empty{text-align:center;padding:60px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><div class="nav-logo-mark">M</div><span class="nav-brand">MarketHub</span></div>
  <div class="nav-right">
    <a href="/products" class="nav-link">Products</a>
    <a href="/seller/my-products" class="nav-link">My Products</a>
    <a href="/seller/orders" class="nav-link active">Orders</a>
    <a href="/admin/dashboard" class="nav-link" sec:authorize="hasRole('ADMIN')">Admin</a>
    <form method="post" th:action="@{/logout}" style="margin:0;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn-logout" type="submit">Sign Out</button>
    </form>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Incoming <em>Orders</em></h1>
    <p>Manage and update order statuses for your products</p>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat"><div class="stat-num num-pending"   th:text="${pendingCount}">0</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-num num-processing" th:text="${processingCount}">0</div><div class="stat-label">Processing</div></div>
    <div class="stat"><div class="stat-num num-shipped"   th:text="${shippedCount}">0</div><div class="stat-label">Shipped</div></div>
    <div class="stat"><div class="stat-num num-delivered" th:text="${deliveredCount}">0</div><div class="stat-label">Delivered</div></div>
    <div class="stat"><div class="stat-num num-cancelled" th:text="${cancelledCount}">0</div><div class="stat-label">Cancelled</div></div>
    <div class="stat"><div class="stat-num num-revenue"   th:text="'$' + ${#numbers.formatDecimal(revenue,1,2)}">$0</div><div class="stat-label">Revenue</div></div>
  </div>

  <!-- Status Filter -->
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <a href="/seller/orders" class="filter-btn" th:classappend="${statusFilter == null} ? ' active' : ''">All</a>
    <a th:each="s : ${allStatuses}"
       th:href="@{/seller/orders(status=${s.name()})}"
       class="filter-btn"
       th:classappend="${statusFilter == s.name()} ? ' active' : ''"
       th:text="${s.name()}"></a>
  </div>

  <div th:if="${orders.empty}" class="empty">
    <div class="empty-icon">📭</div>
    <p>No orders found.</p>
  </div>

  <div class="table-wrap" th:unless="${orders.empty}">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Product</th><th>Buyer</th><th>Qty</th><th>Total</th><th>Status</th><th>Update</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="o : ${orders}">
          <td th:text="${o.id}"></td>
          <td th:text="${o.product.name}"></td>
          <td th:text="${o.buyer.username}"></td>
          <td th:text="${o.quantity}"></td>
          <td class="total-cell" th:text="'$' + ${#numbers.formatDecimal(o.product.price * o.quantity, 1, 2)}"></td>
          <td>
            <span class="status-badge"
                  th:classappend="'status-' + ${o.status.name()}"
                  th:text="${o.status.name()}"></span>
          </td>
          <td>
            <form th:action="@{/seller/orders/{id}/status(id=${o.id})}" method="post" class="status-form">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <select name="status" class="status-select">
                <option th:each="s : ${allStatuses}"
                        th:value="${s.name()}"
                        th:text="${s.name()}"
                        th:selected="${o.status == s}"></option>
              </select>
              <button class="btn-update" type="submit">Update</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
