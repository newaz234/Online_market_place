<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Admin — Reviews</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--gold:#c9a84c;--gold2:#e8c96d;
  --text:#f0ede8;--muted:#7a7a8a;--border:#2a2a3a;--border2:#1e1e2c;--success:#4caf82;--danger:#e05c5c;--info:#5c8ee0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);
  padding:24px 16px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;}
.logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;padding:12px 10px 20px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.logo span{color:var(--gold);}
.nav-item{padding:10px 14px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:8px;}
.nav-item:hover,.nav-item.active{background:rgba(201,168,76,0.08);color:var(--gold);}
.nav-item.danger:hover{background:rgba(224,92,92,0.08);color:var(--danger);}
.nav-bottom{margin-top:auto;}
.main{flex:1;padding:32px;overflow-y:auto;}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:24px;}
h1 em{font-style:italic;color:var(--gold);}
.review-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start;}
.review-card.hidden-review{opacity:.5;border-style:dashed;}
.review-body{flex:1;}
.review-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.reviewer{font-weight:600;font-size:14px;}
.product-name{font-size:12px;color:var(--muted);}
.stars{color:var(--gold);font-size:14px;letter-spacing:2px;}
.review-comment{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px;}
.review-date{font-size:11px;color:var(--muted);}
.hidden-label{font-size:11px;color:var(--danger);font-weight:600;}
.review-actions{display:flex;flex-direction:column;gap:8px;min-width:100px;}
.btn{padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:7px;
  color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;width:100%;}
.btn-hide:hover{border-color:var(--warn,#e0a84c);color:#e0a84c;}
.btn-show:hover{border-color:var(--success);color:var(--success);}
.btn-del:hover{border-color:var(--danger);color:var(--danger);}
.empty{text-align:center;padding:60px;color:var(--muted);}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">Market<span>Hub</span><br/><small style="font-size:10px;color:var(--gold);font-family:'DM Sans'">ADMIN PANEL</small></div>
  <a href="/admin/dashboard" class="nav-item">🏠 Dashboard</a>
  <a href="/admin/users"     class="nav-item">👥 Users</a>
  <a href="/admin/products"  class="nav-item">📦 Products</a>
  <a href="/admin/orders"    class="nav-item">🧾 Orders</a>
  <a href="/admin/reviews"   class="nav-item active">⭐ Reviews</a>
  <div class="nav-bottom">
    <a href="/products" class="nav-item">🛍 Marketplace</a>
    <form method="post" action="/logout">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button style="width:100%;text-align:left;background:none;border:none;cursor:pointer;" class="nav-item danger" type="submit">🚪 Sign Out</button>
    </form>
  </div>
</nav>
<div class="main">
  <h1>Review <em>Moderation</em></h1>
  <div th:if="${reviews.empty}" class="empty">No reviews yet.</div>
  <div th:each="r : ${reviews}" class="review-card" th:classappend="${!r.visible} ? ' hidden-review' : ''">
    <div class="review-body">
      <div class="review-header">
        <span class="reviewer" th:text="${r.reviewer.username}"></span>
        <span class="product-name">on <span th:text="${r.product.name}"></span></span>
        <span class="hidden-label" th:unless="${r.visible}">HIDDEN</span>
      </div>
      <div class="stars" th:text="${'★'.repeat(r.rating) + '☆'.repeat(5 - r.rating)}"></div>
      <div class="review-comment" th:text="${r.comment}"></div>
      <div class="review-date" th:text="${#temporals.format(r.createdAt,'dd MMM yyyy')}"></div>
    </div>
    <div class="review-actions">
      <form th:action="@{/admin/reviews/{id}/toggle(id=${r.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="btn" th:classappend="${r.visible} ? 'btn-hide' : 'btn-show'" type="submit"
                th:text="${r.visible} ? '🙈 Hide' : '👁 Show'"></button>
      </form>
      <form th:action="@{/admin/reviews/{id}/delete(id=${r.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="btn btn-del" onclick="return confirm('Delete review?')" type="submit">🗑 Delete</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
