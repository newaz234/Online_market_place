<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Admin — Products</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--gold:#c9a84c;--gold2:#e8c96d;
  --text:#f0ede8;--muted:#7a7a8a;--border:#2a2a3a;--border2:#1e1e2c;--danger:#e05c5c;--success:#4caf82;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);
  padding:24px 16px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;}
.logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;padding:12px 10px 20px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.logo span{color:var(--gold);}
.nav-item{padding:10px 14px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:8px;}
.nav-item:hover,.nav-item.active{background:rgba(201,168,76,0.08);color:var(--gold);}
.nav-item.danger:hover{background:rgba(224,92,92,0.08);color:var(--danger);}
.nav-bottom{margin-top:auto;}
.main{flex:1;padding:32px;overflow-y:auto;}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:24px;}
h1 em{font-style:italic;color:var(--gold);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--border);}
th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:12px 16px;font-weight:500;}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border2);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}
.price{color:var(--gold);font-weight:600;}
.cat-badge{font-size:10px;padding:2px 8px;background:rgba(201,168,76,.1);color:var(--gold);border-radius:4px;}
.img-thumb{width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--border);}
.img-placeholder{width:40px;height:40px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;}
.btn-del{padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-del:hover{border-color:var(--danger);color:var(--danger);}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">Market<span>Hub</span><br/><small style="font-size:10px;color:var(--gold);font-family:'DM Sans'">ADMIN PANEL</small></div>
  <a href="/admin/dashboard" class="nav-item">🏠 Dashboard</a>
  <a href="/admin/users"     class="nav-item">👥 Users</a>
  <a href="/admin/products"  class="nav-item active">📦 Products</a>
  <a href="/admin/orders"    class="nav-item">🧾 Orders</a>
  <a href="/admin/reviews"   class="nav-item">⭐ Reviews</a>
  <div class="nav-bottom">
    <a href="/products" class="nav-item">🛍 Marketplace</a>
    <form method="post" action="/logout">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button style="width:100%;text-align:left;background:none;border:none;cursor:pointer;" class="nav-item danger" type="submit">🚪 Sign Out</button>
    </form>
  </div>
</nav>
<div class="main">
  <h1>Product <em>Management</em></h1>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Image</th><th>#</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Seller</th><th>Action</th></tr></thead>
      <tbody>
        <tr th:each="p:${products}">
          <td>
            <img th:if="${p.imageUrl}" th:src="${p.imageUrl}" class="img-thumb" alt=""/>
            <div th:unless="${p.imageUrl}" class="img-placeholder">📦</div>
          </td>
          <td th:text="${p.id}"></td>
          <td th:text="${p.name}"></td>
          <td><span class="cat-badge" th:text="${p.category ?: '—'}"></span></td>
          <td class="price" th:text="'$'+${#numbers.formatDecimal(p.price,1,2)}"></td>
          <td th:text="${p.stock ?: '—'}"></td>
          <td th:text="${p.seller != null ? p.seller.username : '—'}"></td>
          <td>
            <form th:action="@{/admin/products/{id}/delete(id=${p.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button class="btn-del" onclick="return confirm('Delete product?')" type="submit">🗑 Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
