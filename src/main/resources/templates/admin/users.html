<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Admin — Users</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--gold:#c9a84c;--gold2:#e8c96d;
  --text:#f0ede8;--muted:#7a7a8a;--border:#2a2a3a;--border2:#1e1e2c;
  --success:#4caf82;--danger:#e05c5c;--info:#5c8ee0;--warn:#e0a84c;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);
  padding:24px 16px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh;}
.logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;padding:12px 10px 20px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.logo span{color:var(--gold);}
.nav-item{padding:10px 14px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:8px;}
.nav-item:hover,.nav-item.active{background:rgba(201,168,76,0.08);color:var(--gold);}
.nav-item.danger:hover{background:rgba(224,92,92,0.08);color:var(--danger);}
.nav-bottom{margin-top:auto;}
.main{flex:1;padding:32px;overflow-y:auto;}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:24px;}
h1 em{font-style:italic;color:var(--gold);}
.alert{border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;}
.alert-error{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);color:var(--danger);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--border);}
th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:14px 18px;font-weight:500;}
td{padding:13px 18px;font-size:13px;border-bottom:1px solid var(--border2);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}
.role-badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;}
.role-ADMIN{background:rgba(201,168,76,0.15);color:var(--gold);}
.role-SELLER{background:rgba(76,175,130,0.15);color:var(--success);}
.role-BUYER{background:rgba(92,142,224,0.15);color:var(--info);}
.status-badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;}
.status-ok{background:rgba(76,175,130,0.12);color:var(--success);}
.status-restricted{background:rgba(224,92,92,0.12);color:var(--danger);}
.actions{display:flex;gap:8px;}
.btn-action{padding:5px 12px;background:transparent;border:1px solid var(--border);
  border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-restrict{border-color:rgba(224,168,76,0.4);color:var(--warn);}
.btn-restrict:hover{background:rgba(224,168,76,0.08);}
.btn-unrestrict{border-color:rgba(76,175,130,0.4);color:var(--success);}
.btn-unrestrict:hover{background:rgba(76,175,130,0.08);}
.btn-del:hover{border-color:var(--danger);color:var(--danger);}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">Market<span>Hub</span><br/><small style="font-size:10px;color:var(--gold);font-family:'DM Sans'">ADMIN PANEL</small></div>
  <a href="/admin/dashboard" class="nav-item">🏠 Dashboard</a>
  <a href="/admin/users"     class="nav-item active">👥 Users</a>
  <a href="/admin/products"  class="nav-item">📦 Products</a>
  <a href="/admin/orders"    class="nav-item">🧾 Orders</a>
  <a href="/admin/reviews"   class="nav-item">⭐ Reviews</a>
  <div class="nav-bottom">
    <a href="/products" class="nav-item">🛍 Marketplace</a>
    <form method="post" action="/logout">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button style="width:100%;text-align:left;background:none;border:none;cursor:pointer;" class="nav-item danger" type="submit">🚪 Sign Out</button>
    </form>
  </div>
</nav>
<div class="main">
  <h1>User <em>Management</em></h1>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Username</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:each="u : ${users}">
          <td th:text="${u.id}"></td>
          <td><strong th:text="${u.username}"></strong></td>
          <td><span class="role-badge" th:classappend="'role-'+${u.role}" th:text="${u.role}"></span></td>
          <td>
            <span class="status-badge status-restricted" th:if="${u.restricted}">🔒 Restricted</span>
            <span class="status-badge status-ok" th:unless="${u.restricted}">✓ Active</span>
          </td>
          <td>
            <div class="actions" th:unless="${u.role.name() == 'ADMIN'}">
              <form th:action="@{/admin/users/{id}/toggle-restrict(id=${u.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn-action" th:classappend="${u.restricted} ? 'btn-unrestrict' : 'btn-restrict'" type="submit"
                        th:text="${u.restricted} ? '🔓 Unrestrict' : '🔒 Restrict'"></button>
              </form>
              <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn-action btn-del" onclick="return confirm('Delete this user?')" type="submit">🗑 Delete</button>
              </form>
            </div>
            <span th:if="${u.role.name() == 'ADMIN'}" style="color:var(--muted);font-size:12px;">Protected</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
