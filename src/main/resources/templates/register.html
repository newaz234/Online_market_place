<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MarketHub — Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
          --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c28;
          --gold:#c9a84c; --gold2:#e8c96d;
          --text:#f0ede8; --muted:#7a7a8a; --border:#2a2a3a;
          --danger:#e05c5c;
        }
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
          min-height:100vh;display:flex;align-items:center;justify-content:center;
          position:relative;overflow:hidden;}
        body::before{content:'';position:fixed;top:-30%;left:-20%;width:600px;height:600px;
          background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
          padding:50px 44px;width:100%;max-width:440px;
          box-shadow:0 30px 80px rgba(0,0,0,0.5);animation:fadeUp .5s ease;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
        .logo{text-align:center;margin-bottom:36px;}
        .logo-mark{display:inline-flex;align-items:center;justify-content:center;
          width:54px;height:54px;background:linear-gradient(135deg,var(--gold),var(--gold2));
          border-radius:14px;font-family:'Playfair Display',serif;font-size:24px;font-weight:700;
          color:#0a0a0f;margin-bottom:14px;box-shadow:0 8px 24px rgba(201,168,76,0.3);}
        .logo h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;letter-spacing:0.5px;}
        .logo p{font-size:13px;color:var(--muted);margin-top:4px;}
        .alert-error{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);
          border-radius:8px;padding:11px 14px;font-size:13px;color:var(--danger);
          margin-bottom:20px;display:flex;align-items:center;gap:8px;}
        .form-group{margin-bottom:20px;}
        label{display:block;font-size:12px;font-weight:500;color:var(--muted);
          letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
        input,select{width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);
          border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;
          transition:border-color .2s,box-shadow .2s;outline:none;appearance:none;}
        input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
        input::placeholder{color:var(--muted);}
        select option{background:var(--surface2);}
        .roles{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .role-card{
          display:flex;flex-direction:column;align-items:center;padding:16px 10px;
          background:var(--surface2);border:2px solid var(--border);border-radius:10px;
          cursor:pointer;transition:border-color .2s,background .2s;
          position:relative;
        }
        .role-card input[type=radio]{
          position:absolute;opacity:0;width:0;height:0;
        }
        .role-card.selected{border-color:var(--gold);background:rgba(201,168,76,0.08);}
        .role-icon{font-size:24px;margin-bottom:8px;}
        .role-label{font-size:13px;font-weight:500;color:var(--text);}
        .role-desc{font-size:11px;color:var(--muted);margin-top:3px;}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));
          color:#0a0a0f;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;
          font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px;}
        .btn:hover{opacity:0.9;}
        .footer-link{text-align:center;margin-top:24px;font-size:13px;color:var(--muted);}
        .footer-link a{color:var(--gold);text-decoration:none;font-weight:500;}
        .footer-link a:hover{text-decoration:underline;}
        .hint{font-size:11px;color:var(--muted);margin-top:6px;}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-mark">M</div>
        <h1>MarketHub</h1>
        <p>Create your account</p>
    </div>

    <div th:if="${error}" class="alert-error">
        <span>⚠</span> <span th:text="${error}"></span>
    </div>

    <form method="post" th:action="@{/register}" id="regForm">
        <div class="form-group">
            <label>Username</label>
            <input name="username" placeholder="Choose a username" required
                   th:value="${param.username}"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="At least 4 characters" required/>
            <p class="hint">Minimum 4 characters</p>
        </div>
        <div class="form-group">
            <label>I want to</label>
            <div class="roles">
                <div class="role-card selected" id="card-buyer" onclick="selectRole('BUYER')">
                    <div class="role-icon">🛍️</div>
                    <div class="role-label">Buy</div>
                    <div class="role-desc">Shop products</div>
                </div>
                <div class="role-card" id="card-seller" onclick="selectRole('SELLER')">
                    <div class="role-icon">🏪</div>
                    <div class="role-label">Sell</div>
                    <div class="role-desc">List products</div>
                </div>
            </div>
            <input type="hidden" name="role" id="roleInput" value="BUYER"/>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="btn" type="submit">Create Account</button>
    </form>
    <div class="footer-link">Already have an account? <a href="/login">Sign in</a></div>
</div>
<script>
    function selectRole(role) {
      document.getElementById('roleInput').value = role;
      document.getElementById('card-buyer').classList.toggle('selected', role === 'BUYER');
      document.getElementById('card-seller').classList.toggle('selected', role === 'SELLER');
    }
</script>
</body>
</html>
