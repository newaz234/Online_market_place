<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MarketHub — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
          --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c28;
          --gold:#c9a84c; --gold2:#e8c96d;
          --text:#f0ede8; --muted:#7a7a8a; --border:#2a2a3a;
          --danger:#e05c5c; --success:#4caf82;
        }
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
          min-height:100vh;display:flex;align-items:center;justify-content:center;
          position:relative;overflow:hidden;}
        body::before{content:'';position:fixed;top:-30%;left:-20%;width:600px;height:600px;
          background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none;}
        body::after{content:'';position:fixed;bottom:-20%;right:-15%;width:500px;height:500px;
          background:radial-gradient(circle,rgba(100,80,200,0.06) 0%,transparent 70%);pointer-events:none;}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
          padding:50px 44px;width:100%;max-width:420px;
          box-shadow:0 30px 80px rgba(0,0,0,0.5);animation:fadeUp .5s ease;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
        .logo{text-align:center;margin-bottom:36px;}
        .logo-mark{display:inline-flex;align-items:center;justify-content:center;
          width:54px;height:54px;background:linear-gradient(135deg,var(--gold),var(--gold2));
          border-radius:14px;font-family:'Playfair Display',serif;font-size:24px;font-weight:700;
          color:#0a0a0f;margin-bottom:14px;box-shadow:0 8px 24px rgba(201,168,76,0.3);}
        .logo h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;letter-spacing:0.5px;}
        .logo p{font-size:13px;color:var(--muted);margin-top:4px;}
        .alert{border-radius:8px;padding:11px 14px;font-size:13px;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
        .alert-error{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);color:var(--danger);}
        .alert-success{background:rgba(76,175,130,0.1);border:1px solid rgba(76,175,130,0.3);color:var(--success);}
        .form-group{margin-bottom:20px;}
        label{display:block;font-size:12px;font-weight:500;color:var(--muted);
          letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
        input{width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);
          border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;
          transition:border-color .2s,box-shadow .2s;outline:none;}
        input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
        input::placeholder{color:var(--muted);}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));
          color:#0a0a0f;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;
          font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:8px;}
        .btn:hover{opacity:0.9;} .btn:active{transform:scale(0.99);}
        .footer-link{text-align:center;margin-top:24px;font-size:13px;color:var(--muted);}
        .footer-link a{color:var(--gold);text-decoration:none;font-weight:500;}
        .footer-link a:hover{text-decoration:underline;}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-mark">M</div>
        <h1>MarketHub</h1>
        <p>Sign in to your account</p>
    </div>

    <div th:if="${error}" class="alert alert-error">
        <span>⚠</span> <span th:text="${error}">Invalid credentials.</span>
    </div>
    <div th:if="${message}" class="alert alert-success">
        <span>✓</span> <span th:text="${message}">Logged out.</span>
    </div>
    <div th:if="${param.registered}" class="alert alert-success">
        <span>✓</span> Account created! Please sign in.
    </div>

    <form method="post" th:action="@{/login}">
        <div class="form-group">
            <label>Username</label>
            <input name="username" placeholder="Enter your username" autocomplete="username" required/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required/>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="btn" type="submit">Sign In</button>
    </form>
    <div class="footer-link">Don't have an account? <a href="/register">Register here</a></div>
</div>
</body>
</html>
