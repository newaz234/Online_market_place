<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MarketHub — Edit Product</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--gold:#c9a84c;--gold2:#e8c96d;
  --text:#f0ede8;--muted:#7a7a8a;--border:#2a2a3a;--danger:#e05c5c;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
nav{background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;gap:12px;}
.nav-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:#0a0a0f;}
.nav-brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.back-link{color:var(--muted);text-decoration:none;font-size:14px;padding:7px 14px;border:1px solid var(--border);border-radius:8px;}
.back-link:hover{color:var(--gold);border-color:var(--gold);}
.container{max-width:560px;margin:52px auto;padding:0 24px;}
h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;margin-bottom:4px;}
h1 em{font-style:italic;color:var(--gold);}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:32px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;}
.form-group{margin-bottom:18px;}
label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:500;}
input,select,textarea{width:100%;padding:11px 13px;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
textarea{resize:vertical;min-height:80px;}
input[type=file]{background:var(--surface2);padding:10px;cursor:pointer;}
.current-image{margin-bottom:10px;}
.current-image img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);}
.actions{display:flex;gap:12px;margin-top:24px;}
.btn-save{flex:1;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:9px;color:#0a0a0f;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.btn-save:hover{opacity:.88;}
.btn-cancel{padding:12px 20px;background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:14px;text-decoration:none;text-align:center;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><div class="nav-logo-mark">M</div><span class="nav-brand">MarketHub</span></div>
  <a href="/seller/my-products" class="back-link">← My Products</a>
</nav>
<div class="container">
  <h1>Edit <em>Product</em></h1>
  <p class="subtitle">Update product information and image</p>
  <div class="card">
    <form th:action="@{/products/edit/{id}(id=${product.id})}" method="post" enctype="multipart/form-data">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label>Product Name</label>
        <input name="name" th:value="${product.name}" required/>
      </div>
      <div class="form-group">
        <label>Price ($)</label>
        <input name="price" type="number" step="0.01" min="0" th:value="${product.price}" required/>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category">
          <option value="">Select category</option>
          <option value="Electronics" th:selected="${product.category == 'Electronics'}">Electronics</option>
          <option value="Clothing"    th:selected="${product.category == 'Clothing'}">Clothing</option>
          <option value="Books"       th:selected="${product.category == 'Books'}">Books</option>
          <option value="Home"        th:selected="${product.category == 'Home'}">Home &amp; Garden</option>
          <option value="Sports"      th:selected="${product.category == 'Sports'}">Sports</option>
          <option value="Food"        th:selected="${product.category == 'Food'}">Food</option>
          <option value="Other"       th:selected="${product.category == 'Other'}">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Stock Quantity</label>
        <input name="stock" type="number" min="0" th:value="${product.stock}"/>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" th:text="${product.description}"></textarea>
      </div>
      <div class="form-group">
        <label>Product Image</label>
        <div class="current-image" th:if="${product.imageUrl}">
          <img th:src="${product.imageUrl}" alt="Current image"/>
          <p style="font-size:12px;color:var(--muted);margin-top:6px;">Current image (upload new to replace)</p>
        </div>
        <input type="file" name="imageFile" accept="image/*"/>
      </div>
      <div class="actions">
        <button class="btn-save" type="submit">Save Changes</button>
        <a href="/seller/my-products" class="btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
