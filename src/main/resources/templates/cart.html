<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MarketHub — Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--gold:#c9a84c;--gold2:#e8c96d;
  --text:#f0ede8;--muted:#7a7a8a;--border:#2a2a3a;--border2:#1e1e2c;
  --success:#4caf82;--danger:#e05c5c;--info:#5c8ee0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:12px;}
.nav-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:#0a0a0f;}
.nav-brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-link{padding:7px 14px;color:var(--muted);text-decoration:none;font-size:13px;border:1px solid var(--border);border-radius:8px;transition:all .2s;}
.nav-link:hover,.nav-link.active{color:var(--gold);border-color:var(--gold);}
.btn-logout{padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
.container{max-width:900px;margin:40px auto;padding:0 28px;}
.page-header{margin-bottom:28px;}
.page-header h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;margin-bottom:4px;}
.page-header h1 em{font-style:italic;color:var(--gold);}
.page-header p{font-size:14px;color:var(--muted);}
.alert{border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;display:flex;align-items:center;gap:8px;}
.alert-success{background:rgba(76,175,130,0.1);border:1px solid rgba(76,175,130,0.3);color:var(--success);}
.alert-error{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);color:var(--danger);}
.cart-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;}
.cart-items{display:flex;flex-direction:column;gap:12px;}
.cart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;
  display:flex;align-items:center;gap:16px;animation:cardIn .3s ease;}
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.cart-info{flex:1;}
.cart-name{font-weight:600;font-size:15px;margin-bottom:4px;}
.cart-price{font-size:13px;color:var(--muted);}
.cart-controls{display:flex;align-items:center;gap:10px;}
.qty-form{display:flex;align-items:center;gap:6px;}
.qty-input{width:56px;padding:6px;background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;color:var(--text);text-align:center;font-size:13px;outline:none;}
.qty-input:focus{border-color:var(--gold);}
.btn-update{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-update:hover{border-color:var(--gold);color:var(--gold);}
.item-total{font-weight:600;color:var(--gold);font-size:15px;min-width:70px;text-align:right;}
.btn-remove{padding:6px 12px;background:transparent;border:1px solid var(--border);
  border-radius:7px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-remove:hover{border-color:var(--danger);color:var(--danger);}
.cart-summary{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:24px;height:fit-content;position:sticky;top:80px;}
.summary-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:20px;}
.summary-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px;}
.summary-row.total{border-top:1px solid var(--border);padding-top:14px;margin-top:6px;
  font-size:18px;font-weight:700;}
.summary-row.total span:last-child{color:var(--gold);}
.btn-checkout{display:block;width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:10px;color:#0a0a0f;font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;margin-top:16px;}
.btn-checkout:hover{opacity:.88;}
.empty{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty h3{font-size:20px;color:var(--text);margin-bottom:8px;}
.shop-link{display:inline-block;margin-top:16px;padding:12px 28px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0f;
  border-radius:10px;text-decoration:none;font-weight:600;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><div class="nav-logo-mark">M</div><span class="nav-brand">MarketHub</span></div>
  <div class="nav-right">
    <a href="/products" class="nav-link">Products</a>
    <a href="/cart" class="nav-link active">🛒 Cart</a>
    <a href="/orders" class="nav-link">My Orders</a>
    <a href="/seller/my-products" class="nav-link" sec:authorize="hasAnyRole('SELLER','ADMIN')">My Products</a>
    <form method="post" th:action="@{/logout}" style="margin:0;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn-logout" type="submit">Sign Out</button>
    </form>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Your <em>Cart</em></h1>
    <p>Review items before checkout</p>
  </div>

  <div th:if="${cartSuccess}" class="alert alert-success">✓ <span th:text="${cartSuccess}"></span></div>
  <div th:if="${cartError}"   class="alert alert-error">⚠ <span th:text="${cartError}"></span></div>

  <div th:if="${cartItems.empty}" class="empty">
    <div class="empty-icon">🛒</div>
    <h3>Your cart is empty</h3>
    <p>Add products to your cart before checking out.</p>
    <a href="/products" class="shop-link">Browse Products</a>
  </div>

  <div class="cart-layout" th:unless="${cartItems.empty}">
    <div class="cart-items">
      <div class="cart-card" th:each="item : ${cartItems}">
        <div class="cart-info">
          <div class="cart-name" th:text="${item.productName}"></div>
          <div class="cart-price" th:text="'$' + ${#numbers.formatDecimal(item.price, 1, 2)} + ' each'"></div>
        </div>
        <div class="cart-controls">
          <form th:action="@{/cart/update}" method="post" class="qty-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="productId" th:value="${item.productId}"/>
            <input class="qty-input" type="number" name="quantity" th:value="${item.quantity}"
                   min="1" th:max="${item.maxStock ?: 999}"/>
            <button class="btn-update" type="submit">Update</button>
          </form>
          <div class="item-total" th:text="'$' + ${#numbers.formatDecimal(item.totalPrice, 1, 2)}"></div>
          <form th:action="@{/cart/remove}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="productId" th:value="${item.productId}"/>
            <button class="btn-remove" type="submit">Remove</button>
          </form>
        </div>
      </div>
    </div>

    <div class="cart-summary">
      <div class="summary-title">Order Summary</div>
      <div class="summary-row" th:each="item : ${cartItems}">
        <span th:text="${item.productName}"></span>
        <span th:text="'$' + ${#numbers.formatDecimal(item.totalPrice, 1, 2)}"></span>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
      </div>
      <a href="/cart/checkout" class="btn-checkout">Proceed to Checkout →</a>
    </div>
  </div>
</div>
</body>
</html>
