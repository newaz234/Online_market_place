<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MarketHub — Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--gold:#c9a84c;--gold2:#e8c96d;
  --text:#f0ede8;--muted:#7a7a8a;--border:#2a2a3a;--border2:#1e1e2c;
  --success:#4caf82;--danger:#e05c5c;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:12px;}
.nav-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:#0a0a0f;}
.nav-brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.back-link{padding:7px 14px;color:var(--muted);text-decoration:none;font-size:13px;border:1px solid var(--border);border-radius:8px;transition:all .2s;}
.back-link:hover{color:var(--gold);border-color:var(--gold);}
.container{max-width:920px;margin:40px auto;padding:0 28px;}
.page-header{margin-bottom:28px;}
.page-header h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;margin-bottom:4px;}
.page-header h1 em{font-style:italic;color:var(--gold);}
.page-header p{font-size:14px;color:var(--muted);}
.alert-error{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);color:var(--danger);
  border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;}
.checkout-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;}
.section-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  font-weight:500;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border2);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.form-grid.full{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.span2{grid-column:span 2;}
label{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:500;}
input{padding:11px 13px;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
input:focus{border-color:var(--gold);}
input::placeholder{color:#4a4a5a;}
.required-note{font-size:12px;color:var(--muted);margin-top:4px;}
.order-summary{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:24px;height:fit-content;position:sticky;top:80px;}
.summary-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:20px;}
.summary-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border2);font-size:13px;}
.summary-item:last-of-type{border-bottom:none;}
.summary-item-name{color:var(--text);}
.summary-item-total{color:var(--gold);font-weight:600;}
.summary-total{display:flex;justify-content:space-between;padding-top:14px;margin-top:6px;
  border-top:2px solid var(--border);font-size:18px;font-weight:700;}
.summary-total span:last-child{color:var(--gold);}
.btn-place{width:100%;padding:15px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:10px;color:#0a0a0f;font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;}
.btn-place:hover{opacity:.88;}
.trust-badges{display:flex;gap:12px;margin-top:14px;justify-content:center;}
.trust-badge{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><div class="nav-logo-mark">M</div><span class="nav-brand">MarketHub</span></div>
  <a href="/cart" class="back-link">← Back to Cart</a>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Secure <em>Checkout</em></h1>
    <p>Fill in your details to complete the order</p>
  </div>

  <div th:if="${checkoutError}" class="alert-error">⚠ <span th:text="${checkoutError}"></span></div>

  <div class="checkout-layout">
    <form th:action="@{/cart/checkout}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-card" style="margin-bottom:20px;">
        <div class="section-label">👤 Contact Information</div>
        <div class="form-grid">
          <div class="form-group span2">
            <label>Full Name *</label>
            <input name="fullName" placeholder="Your full name" required/>
          </div>
          <div class="form-group">
            <label>Phone Number *</label>
            <input name="phone" type="tel" placeholder="+880 1xxx-xxxxxx" required/>
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input name="email" type="email" placeholder="you@example.com" required/>
          </div>
        </div>
      </div>

      <div class="form-card">
        <div class="section-label">📍 Shipping Address</div>
        <div class="form-grid">
          <div class="form-group span2">
            <label>Street Address *</label>
            <input name="address" placeholder="House no, road, area" required/>
          </div>
          <div class="form-group">
            <label>City *</label>
            <input name="city" placeholder="Dhaka" required/>
          </div>
          <div class="form-group">
            <label>Postal Code</label>
            <input name="postalCode" placeholder="1200"/>
          </div>
        </div>
        <p class="required-note">* Required fields. The seller will contact you using this information.</p>
      </div>

      <!-- Submit button inside form -->
      <button class="btn-place" type="submit" style="margin-top:20px;">✓ Place Order</button>
      <div class="trust-badges">
        <span class="trust-badge">🔒 Secure</span>
        <span class="trust-badge">📦 Fast Delivery</span>
        <span class="trust-badge">✅ Verified Sellers</span>
      </div>
    </form>

    <div class="order-summary">
      <div class="summary-title">Order Summary</div>
      <div class="summary-item" th:each="item : ${cartItems}">
        <span class="summary-item-name">
          <span th:text="${item.productName}"></span>
          <span style="color:var(--muted);font-size:12px;" th:text="' x' + ${item.quantity}"></span>
        </span>
        <span class="summary-item-total" th:text="'$' + ${#numbers.formatDecimal(item.totalPrice, 1, 2)}"></span>
      </div>
      <div class="summary-total">
        <span>Total</span>
        <span th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
